<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quality Lab — Song Space</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #111; color: #eee; font-family: 'SF Mono', 'Fira Code', monospace; overflow: hidden; }

    .layout { display: flex; height: 100vh; }
    .video-side { flex: 1; position: relative; background: #000; }
    .video-side canvas { width: 100%; height: 100%; object-fit: contain; }
    .panel-side { width: 420px; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 4px; }

    h2 { font-size: 11px; text-transform: uppercase; letter-spacing: 2px; color: #888; margin: 12px 0 6px; }
    h2:first-child { margin-top: 0; }

    .quality-row { display: flex; align-items: center; gap: 8px; height: 22px; }
    .quality-name { font-size: 11px; width: 110px; text-align: right; color: #999; flex-shrink: 0; }
    .quality-track { flex: 1; height: 14px; background: #222; border-radius: 3px; overflow: hidden; position: relative; }
    .quality-fill { height: 100%; border-radius: 3px; transition: width 0.05s linear; min-width: 1px; }
    .quality-value { font-size: 10px; width: 36px; text-align: right; color: #666; flex-shrink: 0; }

    /* Color coding by type */
    .type-temporal .quality-fill { background: #4a9eff; }
    .type-spatial .quality-fill { background: #ff9f43; }
    .type-impulse .quality-fill { background: #ee5a6f; }

    .legend { display: flex; gap: 16px; padding: 8px 0 4px; }
    .legend-item { font-size: 10px; display: flex; align-items: center; gap: 4px; color: #888; }
    .legend-dot { width: 8px; height: 8px; border-radius: 2px; }
    .legend-dot.temporal { background: #4a9eff; }
    .legend-dot.spatial { background: #ff9f43; }
    .legend-dot.impulse { background: #ee5a6f; }

    /* Reading rows */
    .reading-row { display: flex; align-items: center; gap: 8px; height: 22px; }
    .reading-dot { width: 8px; height: 8px; border-radius: 50%; background: #333; flex-shrink: 0; transition: background 0.15s; }
    .reading-dot.active { background: #4caf50; box-shadow: 0 0 4px #4caf50; }
    .reading-name { font-size: 11px; width: 80px; text-align: right; color: #999; flex-shrink: 0; }
    .reading-track { flex: 1; height: 14px; background: #222; border-radius: 3px; overflow: hidden; }
    .reading-fill { height: 100%; border-radius: 3px; transition: width 0.05s linear; background: #4caf50; min-width: 1px; }
    .reading-fill.gated { background: #444; }
    .reading-value { font-size: 10px; width: 36px; text-align: right; color: #666; flex-shrink: 0; }
    .gate-info { font-size: 9px; color: #555; flex-shrink: 0; max-width: 160px; overflow: hidden; white-space: nowrap; }
    .gate-pass { color: #4caf50; }
    .gate-fail { color: #ee5a6f; }

    /* Intent rows */
    .intent-row { display: flex; align-items: center; gap: 8px; height: 22px; }
    .intent-mode { font-size: 9px; width: 16px; text-align: center; color: #555; flex-shrink: 0; font-weight: bold; }
    .intent-mode.continuous { color: #4a9eff; }
    .intent-mode.edge { color: #ff9f43; }
    .intent-name { font-size: 11px; width: 120px; text-align: right; color: #999; flex-shrink: 0; overflow: hidden; white-space: nowrap; }
    .intent-track { flex: 1; height: 14px; background: #222; border-radius: 3px; overflow: hidden; position: relative; }
    .intent-fill { height: 100%; border-radius: 3px; transition: width 0.05s linear; min-width: 1px; }
    .intent-fill.continuous { background: #4a9eff; }
    .intent-fill.edge-waiting { background: #ff9f43; }
    .intent-fill.edge-fired { background: #4caf50; }
    .intent-status { font-size: 9px; width: 60px; text-align: right; color: #555; flex-shrink: 0; }
    .intent-status.active { color: #4caf50; }
    .intent-status.fired { color: #ff9f43; }
    .intent-action { font-size: 9px; color: #555; flex-shrink: 0; max-width: 140px; overflow: hidden; white-space: nowrap; }
    .intent-action.flash { color: #ff9f43; transition: color 0.1s; }

    .status-msg { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 14px; color: #666; text-align: center; }

    /* Session record/replay bar */
    .session-bar { display: flex; align-items: center; gap: 8px; padding-bottom: 8px; border-bottom: 1px solid #222; margin-bottom: 4px; }
    .session-bar button { background: #222; color: #ccc; border: 1px solid #333; border-radius: 3px; font: inherit; font-size: 11px; padding: 4px 10px; cursor: pointer; }
    .session-bar button:hover { background: #2a2a2a; }
    .session-bar button.recording { background: #5a1f28; color: #ffb3bd; border-color: #ee5a6f; }
    .session-bar input[type="text"] { background: #1a1a1a; color: #ccc; border: 1px solid #333; border-radius: 3px; font: inherit; font-size: 11px; padding: 4px 6px; width: 140px; }
    .session-status { font-size: 10px; color: #666; overflow: hidden; white-space: nowrap; }
    .label-overlay { position: absolute; top: 16px; left: 50%; transform: translateX(-50%); font-size: 20px; letter-spacing: 3px; text-transform: uppercase; color: #fff; background: rgba(0,0,0,0.55); padding: 6px 18px; border-radius: 4px; pointer-events: none; }
    .label-overlay.rec { color: #ffb3bd; }

    video { display: none; }
  </style>
</head>
<body>
  <div class="layout">
    <div class="video-side">
      <canvas id="lab-canvas"></canvas>
      <div class="status-msg" id="status">Starting webcam...</div>
      <div class="label-overlay" id="label-overlay" hidden></div>
    </div>
    <div class="panel-side" id="panel">
      <div class="session-bar">
        <button id="rec-btn" title="Record landmark frames to a downloadable session file. Space cycles the segment label while recording.">&#9679; record</button>
        <input type="text" id="rec-labels" value="flowing,staccato" title="Comma-separated segment labels. Space cycles to the next while recording.">
        <button id="load-btn" title="Replay a recorded session file through the pipeline (works without a camera)">load session&hellip;</button>
        <input type="file" id="load-file" accept=".json,application/json" hidden>
        <span class="session-status" id="session-status"></span>
      </div>
      <div class="legend">
        <div class="legend-item"><div class="legend-dot temporal"></div> temporal (over time)</div>
        <div class="legend-item"><div class="legend-dot spatial"></div> spatial (body shape)</div>
        <div class="legend-item"><div class="legend-dot impulse"></div> impulse (event)</div>
      </div>
    </div>
  </div>
  <video id="webcam-video" playsinline></video>

  <script type="module">
    import { MovementDetector } from './js/movement.js';
    import { ReadingsEngine } from './js/readings.js';
    import { RalfRuntime } from './js/runtime.js';
    import { CATEGORIES } from './js/constants.js';
    import { DEFAULT_SCORE } from './js/score.js';
    import { SessionRecorder, downloadSession, validateSession } from './js/session-recorder.js';
    import * as webcam from './js/webcam.js';

    const canvas = document.getElementById('lab-canvas');
    const ctx = canvas.getContext('2d');
    const panel = document.getElementById('panel');
    const statusEl = document.getElementById('status');
    const video = document.getElementById('webcam-video');
    const labelOverlay = document.getElementById('label-overlay');
    const recBtn = document.getElementById('rec-btn');
    const recLabelsInput = document.getElementById('rec-labels');
    const loadBtn = document.getElementById('load-btn');
    const loadFile = document.getElementById('load-file');
    const sessionStatus = document.getElementById('session-status');

    // Pipeline state is recreated per source (live vs replay) so a replay
    // starts from clean AdaptiveRange / hysteresis / edge-trigger state
    // instead of inheriting whatever the live session accumulated.
    let detector, readingsEngine, runtime;

    // 'live' drives the pipeline from the webcam; 'replay' from a loaded session.
    let mode = 'live';
    let replayState = null; // { session, startWall, idx, lastT }
    const recorder = new SessionRecorder();

    // Mock output adapter — records actions instead of playing audio.
    // Must implement the FULL output-adapter interface from runtime.js
    // (including setEffect and the quantized mute/restore variants), or
    // runtime.update throws mid-frame and kills the panel loop.
    const mockEngine = {
      loaded: true,
      _lastAction: null,
      _actionFlash: 0,
      _muted: new Set(),
      _flash(msg) { this._lastAction = msg; this._actionFlash = 30; },
      setCategoryVolume() {},
      isTriggerMuted(cat) { return this._muted.has(cat); },
      muteCategory(cat) { this._muted.add(cat); this._flash(`mute ${cat}`); },
      muteCategoryQuantized(cat) { this._muted.add(cat); this._flash(`mute ${cat} (bar)`); },
      restoreCategory(cat) { this._muted.delete(cat); this._flash(`restore ${cat}`); },
      restoreCategoryQuantized(cat) { this._muted.delete(cat); this._flash(`restore ${cat} (bar)`); },
      triggerOneshot(cat, db) { this._flash(`oneshot ${cat}`); },
      sweepFilter(cat, from, to, dur) { this._flash(`sweep ${cat} ${from}→${to}`); },
      setEffect(cat, effect, param, value) { /* continuous — too chatty to flash */ },
    };

    const runtimeScore = {
      readings: DEFAULT_SCORE.readings.solo,
      intents: DEFAULT_SCORE.intents,
      mappings: DEFAULT_SCORE.mappings,
    };

    function freshPipeline() {
      detector = new MovementDetector();
      readingsEngine = new ReadingsEngine(DEFAULT_SCORE.readings.solo);
      mockEngine._muted.clear();
      runtime = new RalfRuntime(runtimeScore, mockEngine);
    }
    freshPipeline();

    const bars = {};
    const readingBars = {};
    const intentRows = {};

    // Quality metadata: type + description
    const QUALITY_META = {
      velocity:      { type: 'temporal', desc: 'overall movement speed (scale-normalized)' },
      impulse:       { type: 'temporal', desc: 'sudden velocity burst — spike and decay' },
      coherence:     { type: 'temporal', desc: 'left/right sides moving together (gated on velocity)' },
      jerkiness:     { type: 'temporal', desc: 'windowed variance of acceleration — lab-only, not in QUALITY_KEYS (#48)' },
      contraction:   { type: 'spatial',  desc: 'all extremities near body center (hands + feet)' },
      verticality:   { type: 'spatial',  desc: 'upright posture (head above hips)' },
      wristSpread:   { type: 'spatial',  desc: 'arm extension (hands far from center)' },
      armsRaised:    { type: 'spatial',  desc: 'hands above shoulders' },
      legBend:       { type: 'spatial',  desc: 'knee bend angle' },
      headTilt:      { type: 'spatial',  desc: 'head angle from vertical' },
      jump:          { type: 'impulse',  desc: 'vertical launch detected' },
      step:          { type: 'impulse',  desc: 'foot strike — spike per step/stomp' },
    };

    // Group by type for display order
    const GROUPS = [
      { label: 'Temporal — how you move over time', keys: ['velocity', 'impulse', 'coherence', 'jerkiness'] },
      { label: 'Spatial — your body shape right now', keys: ['contraction', 'verticality', 'wristSpread', 'armsRaised', 'legBend', 'headTilt'] },
      { label: 'Impulse — momentary events', keys: ['jump', 'step'] },
    ];

    // Build DOM
    for (const group of GROUPS) {
      const h2 = document.createElement('h2');
      h2.textContent = group.label;
      panel.appendChild(h2);

      for (const key of group.keys) {
        const meta = QUALITY_META[key];
        const row = document.createElement('div');
        row.className = `quality-row type-${meta.type}`;
        row.title = meta.desc;

        const name = document.createElement('div');
        name.className = 'quality-name';
        name.textContent = key;

        const track = document.createElement('div');
        track.className = 'quality-track';

        const fill = document.createElement('div');
        fill.className = 'quality-fill';
        fill.style.width = '0%';

        const val = document.createElement('div');
        val.className = 'quality-value';
        val.textContent = '0.00';

        track.appendChild(fill);
        row.appendChild(name);
        row.appendChild(track);
        row.appendChild(val);
        panel.appendChild(row);

        bars[key] = { fill, val };
      }
    }

    // Build readings DOM
    {
      const h2 = document.createElement('h2');
      h2.textContent = 'Readings — body interpretations';
      panel.appendChild(h2);

      for (const config of DEFAULT_SCORE.readings.solo) {
        const row = document.createElement('div');
        row.className = 'reading-row';

        const dot = document.createElement('div');
        dot.className = 'reading-dot';

        const name = document.createElement('div');
        name.className = 'reading-name';
        name.textContent = config.id;

        const track = document.createElement('div');
        track.className = 'reading-track';

        const fill = document.createElement('div');
        fill.className = 'reading-fill gated';
        fill.style.width = '0%';

        const val = document.createElement('div');
        val.className = 'reading-value';
        val.textContent = '0.00';

        const gateInfo = document.createElement('div');
        gateInfo.className = 'gate-info';

        track.appendChild(fill);
        row.appendChild(dot);
        row.appendChild(name);
        row.appendChild(track);
        row.appendChild(val);
        row.appendChild(gateInfo);
        panel.appendChild(row);

        readingBars[config.id] = { dot, fill, val, gateInfo, config };
      }
    }

    // Build intents DOM
    {
      const h2 = document.createElement('h2');
      h2.textContent = 'Intents — what the brain wants to do';
      panel.appendChild(h2);

      for (const config of DEFAULT_SCORE.readings.solo) {
        if (!config.intents) continue;
        for (let idx = 0; idx < config.intents.length; idx++) {
          const intent = config.intents[idx];
          const key = `${config.id}:${idx}`;

          const row = document.createElement('div');
          row.className = 'intent-row';

          const mode = document.createElement('div');
          mode.className = `intent-mode ${intent.mode}`;
          mode.textContent = intent.mode === 'continuous' ? 'C' : 'E';
          mode.title = intent.mode;

          const name = document.createElement('div');
          name.className = 'intent-name';
          name.textContent = intent.intent;
          name.title = `${config.id} → ${intent.intent}${intent.after ? ` (after ${intent.after}s)` : ''}`;

          const track = document.createElement('div');
          track.className = 'intent-track';

          const fill = document.createElement('div');
          fill.className = `intent-fill ${intent.mode === 'continuous' ? 'continuous' : 'edge-waiting'}`;
          fill.style.width = '0%';

          const status = document.createElement('div');
          status.className = 'intent-status';
          status.textContent = '—';

          const action = document.createElement('div');
          action.className = 'intent-action';

          track.appendChild(fill);
          row.appendChild(mode);
          row.appendChild(name);
          row.appendChild(track);
          row.appendChild(status);
          row.appendChild(action);
          panel.appendChild(row);

          intentRows[key] = { fill, status, action, intent, readingId: config.id };
        }

        // on_exit intents
        if (config.on_exit) {
          for (const intentName of config.on_exit) {
            const key = `${config.id}:exit:${intentName}`;
            const row = document.createElement('div');
            row.className = 'intent-row';

            const mode = document.createElement('div');
            mode.className = 'intent-mode edge';
            mode.textContent = '⏎';
            mode.title = 'on_exit';

            const name = document.createElement('div');
            name.className = 'intent-name';
            name.textContent = intentName;
            name.title = `${config.id} on_exit → ${intentName}`;

            const track = document.createElement('div');
            track.className = 'intent-track';
            const fill = document.createElement('div');
            fill.className = 'intent-fill edge-waiting';
            fill.style.width = '0%';

            const status = document.createElement('div');
            status.className = 'intent-status';
            status.textContent = '—';

            const action = document.createElement('div');
            action.className = 'intent-action';

            track.appendChild(fill);
            row.appendChild(mode);
            row.appendChild(name);
            row.appendChild(track);
            row.appendChild(status);
            row.appendChild(action);
            panel.appendChild(row);

            intentRows[key] = { fill, status, action, intent: { intent: intentName, mode: 'exit' }, readingId: config.id };
          }
        }
      }
    }

    // Format gate conditions for display
    function formatGates(config, qualities) {
      const parts = [];
      for (const [q, cond] of Object.entries(config.gate || {})) {
        const v = (qualities[q] ?? 0).toFixed(2);
        if (cond.above !== undefined) {
          const pass = (qualities[q] ?? 0) >= cond.above;
          parts.push(`<span class="${pass ? 'gate-pass' : 'gate-fail'}">${q}>${cond.above} (${v})</span>`);
        }
        if (cond.below !== undefined) {
          const pass = (qualities[q] ?? 0) <= cond.below;
          parts.push(`<span class="${pass ? 'gate-pass' : 'gate-fail'}">${q}<${cond.below} (${v})</span>`);
        }
      }
      return parts.length > 0 ? parts.join(' ') : '<span style="color:#555">no gate</span>';
    }

    // Draw mirrored video (live) or black background (replay) + landmarks
    function drawFrame(landmarks) {
      canvas.width = video.videoWidth || 640;
      canvas.height = video.videoHeight || 480;
      if (mode === 'live' && video.videoWidth) {
        ctx.save();
        ctx.scale(-1, 1);
        ctx.drawImage(video, -canvas.width, 0, canvas.width, canvas.height);
        ctx.restore();
      } else {
        ctx.fillStyle = '#000';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
      }

      if (landmarks && landmarks.length > 0) {
        for (const body of landmarks) {
          ctx.fillStyle = 'rgba(74, 158, 255, 0.6)';
          for (const lm of body) {
            const x = (1 - lm.x) * canvas.width;
            const y = lm.y * canvas.height;
            ctx.beginPath();
            ctx.arc(x, y, 3, 0, Math.PI * 2);
            ctx.fill();
          }
        }
      }
    }

    // Per-frame pipeline + panel update, shared by live and replay sources.
    // bodies: array of bodies (each 33 landmarks); ts: seconds on the source's clock.
    function processFrame(bodies, ts, dt) {
      const qualities = detector.update(bodies[0], ts);

        for (const [key, bar] of Object.entries(bars)) {
          const v = qualities[key] ?? 0;
          bar.fill.style.width = `${(v * 100).toFixed(1)}%`;
          bar.val.textContent = v.toFixed(2);
        }

        // Update readings
        const readings = readingsEngine.update(qualities, ts);
        for (const r of readings) {
          const rb = readingBars[r.id];
          if (!rb) continue;
          rb.dot.className = r.active ? 'reading-dot active' : 'reading-dot';
          rb.fill.className = r.active ? 'reading-fill' : 'reading-fill gated';
          rb.fill.style.width = `${(r.value * 100).toFixed(1)}%`;
          rb.val.textContent = r.value.toFixed(2);
          rb.gateInfo.innerHTML = formatGates(rb.config, qualities);
        }

        // Update intents via runtime (with mock engine)
        runtime.update(readings, CATEGORIES, dt);

        // Visualize intent states from runtime internals
        for (const [key, ir] of Object.entries(intentRows)) {
          const readingResult = readings.find(r => r.id === ir.readingId);
          const isActive = readingResult ? readingResult.active : false;

          if (ir.intent.mode === 'continuous') {
            const v = isActive ? (readingResult?.value ?? 0) : 0;
            ir.fill.style.width = `${(v * 100).toFixed(1)}%`;
            ir.status.textContent = isActive ? 'active' : '—';
            ir.status.className = isActive ? 'intent-status active' : 'intent-status';
          } else if (ir.intent.mode === 'exit') {
            // on_exit: flash when reading just deactivated
            const wasActive = runtime._edgeState[ir.readingId] ?? false;
            ir.fill.style.width = '0%';
            ir.status.textContent = isActive ? 'armed' : '—';
            ir.status.className = 'intent-status';
          } else {
            // Edge intent — show sustain timer progress
            const sustainTime = runtime._sustainTime[key] ?? 0;
            const fired = runtime._fired[key] ?? false;
            const threshold = ir.intent.after || 0;

            if (isActive && threshold > 0) {
              const progress = Math.min(1, sustainTime / threshold);
              ir.fill.style.width = `${(progress * 100).toFixed(1)}%`;
              ir.fill.className = fired ? 'intent-fill edge-fired' : 'intent-fill edge-waiting';
              ir.status.textContent = fired ? `fired` : `${sustainTime.toFixed(1)}/${threshold}s`;
              ir.status.className = fired ? 'intent-status fired' : 'intent-status active';
            } else if (isActive && threshold === 0) {
              ir.fill.style.width = fired ? '100%' : '0%';
              ir.fill.className = fired ? 'intent-fill edge-fired' : 'intent-fill edge-waiting';
              ir.status.textContent = fired ? 'fired' : 'ready';
              ir.status.className = fired ? 'intent-status fired' : 'intent-status';
            } else {
              ir.fill.style.width = '0%';
              ir.fill.className = 'intent-fill edge-waiting';
              ir.status.textContent = '—';
              ir.status.className = 'intent-status';
            }
          }
        }

        // Flash last edge action from mock engine
        if (mockEngine._actionFlash > 0) {
          mockEngine._actionFlash--;
          const lastActionEl = document.getElementById('last-action');
          if (lastActionEl) {
            lastActionEl.textContent = mockEngine._lastAction || '';
            lastActionEl.className = 'intent-action flash';
          }
        }

        drawFrame(bodies);
    }

    // --- Main loop: always running, pulls from webcam or a loaded session ---

    function tick() {
      if (mode === 'replay') {
        stepReplay();
      } else {
        const results = webcam.isRunning() ? webcam.detect() : null;
        const ts = performance.now() / 1000;
        if (results && results.landmarks && results.landmarks.length > 0) {
          statusEl.style.display = 'none';
          recorder.addFrame(results.landmarks, ts);
          if (recorder.recording) {
            sessionStatus.textContent = `recording: ${recorder.frameCount} frames`;
          }
          processFrame(results.landmarks, ts, 1 / 30);
        } else {
          drawFrame(null);
        }
      }
      requestAnimationFrame(tick);
    }

    // Advance the replay clock and process every frame that has come due.
    function stepReplay() {
      const { session } = replayState;
      const elapsed = performance.now() / 1000 - replayState.startWall;
      while (replayState.idx < session.frames.length && session.frames[replayState.idx].t <= elapsed) {
        const frame = session.frames[replayState.idx++];
        const dt = replayState.lastT === null ? 1 / 30 : Math.max(frame.t - replayState.lastT, 1e-6);
        replayState.lastT = frame.t;
        labelOverlay.textContent = frame.label ?? '';
        labelOverlay.hidden = !frame.label;
        processFrame(frame.bodies, frame.t, dt);
        sessionStatus.textContent = `replay: ${replayState.idx}/${session.frames.length} (${frame.t.toFixed(1)}s)`;
      }
      if (replayState.idx >= session.frames.length) {
        mode = 'live';
        replayState = null;
        labelOverlay.hidden = true;
        sessionStatus.textContent = 'replay finished — back to live';
        freshPipeline();
      }
    }

    // --- Record / load controls ---

    recBtn.addEventListener('click', () => {
      if (mode === 'replay') return;
      if (!recorder.recording) {
        const labels = recLabelsInput.value.split(',').map(s => s.trim()).filter(Boolean);
        recorder.start(labels.length ? labels : ['unlabeled']);
        recBtn.textContent = '■ stop + save';
        recBtn.classList.add('recording');
        labelOverlay.textContent = recorder.currentLabel;
        labelOverlay.classList.add('rec');
        labelOverlay.hidden = false;
        sessionStatus.textContent = 'recording: 0 frames';
      } else {
        const session = recorder.stop();
        recBtn.textContent = '● record';
        recBtn.classList.remove('recording');
        labelOverlay.hidden = true;
        labelOverlay.classList.remove('rec');
        if (session.frame_count > 0) {
          downloadSession(session);
          sessionStatus.textContent = `saved ${session.frame_count} frames (${session.duration_sec.toFixed(1)}s)`;
        } else {
          sessionStatus.textContent = 'nothing recorded (no body tracked)';
        }
      }
    });

    // Space cycles the segment label while recording.
    document.addEventListener('keydown', (e) => {
      if (e.code !== 'Space' || !recorder.recording) return;
      e.preventDefault();
      labelOverlay.textContent = recorder.cycleLabel();
    });

    loadBtn.addEventListener('click', () => { if (mode !== 'replay') loadFile.click(); });
    loadFile.addEventListener('change', async () => {
      const file = loadFile.files[0];
      loadFile.value = '';
      if (!file || recorder.recording) return;
      try {
        const session = validateSession(JSON.parse(await file.text()));
        freshPipeline();
        statusEl.style.display = 'none';
        mode = 'replay';
        replayState = { session, startWall: performance.now() / 1000, idx: 0, lastT: null };
      } catch (err) {
        sessionStatus.textContent = `could not load: ${err.message}`;
      }
    });

    // Start the loop immediately — replay must work while the camera
    // permission prompt is still pending, and with no camera at all.
    tick();
    try {
      await webcam.start();
      statusEl.textContent = 'Move around to see your qualities';
    } catch (err) {
      statusEl.textContent = `Camera unavailable: ${err.message} — you can still load a session`;
    }
  </script>
</body>
</html>
