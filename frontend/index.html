<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Song Space</title>
  <meta name="description" content="Song Space is a webcam-driven musical experience. Your movement blends, layers, and transforms the music in real time. Video is processed in your browser and never uploaded.">

  <link rel="icon" type="image/png" href="favicon.png">

  <!-- Open Graph -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="Song Space">
  <meta property="og:description" content="Your movement plays the music. A webcam-driven musical experience where dancers explore interactive soundscapes.">
  <meta property="og:image" content="/app/og-image.png">

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Song Space">
  <meta name="twitter:description" content="Your movement plays the music. A webcam-driven musical experience where dancers explore interactive soundscapes.">
  <meta name="twitter:image" content="/app/og-image.png">

  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Full-viewport body canvas -->
  <canvas id="body-canvas"></canvas>

  <!-- Floating overlays -->
  <div id="song-picker" class="overlay overlay-top-left"></div>
  <div id="phase-indicator" class="overlay overlay-top-right" style="display:none"></div>
  <div id="readings-meter" class="overlay overlay-bottom"></div>
  <div id="status" class="overlay overlay-status">Select a song to begin</div>
  <div id="stage-hint"></div>

  <!-- Developer controls (hidden by default, shown with ?debug=1) -->
  <div id="controls" style="display:none">
    <button id="play-btn">Play</button>
  </div>

  <!-- Hidden video element for webcam -->
  <video id="webcam-video" style="display:none" playsinline></video>

  <!-- Debug: loop grid -->
  <div id="loop-grid" class="debug-only"></div>

  <!-- Skeleton overlay (debug only) -->
  <canvas id="skeleton-canvas" style="display:none"></canvas>

  <!-- Debug overlay -->
  <pre id="debug-panel" style="display:none"></pre>

  <script src="vendor/Tone.js"></script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
