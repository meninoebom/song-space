<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Song Space</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <h1>SONG SPACE</h1>
    <div id="status">Select a song to begin</div>
  </header>

  <!-- Developer controls (hidden by default, shown with ?debug=1) -->
  <div id="controls" style="display:none">
    <button id="play-btn">Play</button>
    <select id="mode-select">
      <option value="arc">Arc</option>
    </select>
  </div>

  <!-- Hidden video element for webcam -->
  <video id="webcam-video" style="display:none" playsinline></video>

  <main>
    <div id="song-picker"></div>
    <div id="loop-grid"></div>
  </main>

  <!-- Phase indicator for arc mode -->
  <div id="phase-indicator" style="display:none"></div>

  <!-- Skeleton overlay (debug only) -->
  <canvas id="skeleton-canvas" style="display:none"></canvas>

  <!-- Debug overlay (debug only) -->
  <pre id="debug-panel" style="display:none"></pre>

  <script src="https://unpkg.com/tone@14.7.77/build/Tone.js"></script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
