<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Song Space</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Full-viewport body canvas -->
  <canvas id="body-canvas"></canvas>

  <!-- Song picker overlay -->
  <div id="song-picker"></div>

  <!-- Readings meter overlay -->
  <div id="readings-meter"></div>

  <!-- Phase indicator for arc mode -->
  <div id="phase-indicator" style="display:none"></div>

  <!-- Status text -->
  <div id="status">Click a song to start</div>

  <!-- Hidden video element for webcam -->
  <video id="webcam-video" style="display:none" playsinline></video>

  <!-- Developer controls (hidden by default, shown with ?debug=1) -->
  <div id="controls" style="display:none">
    <button id="play-btn">Play</button>
  </div>

  <!-- Debug-only elements -->
  <div id="loop-grid" class="debug-only"></div>
  <canvas id="skeleton-canvas" style="display:none"></canvas>
  <pre id="debug-panel" style="display:none"></pre>

  <script src="https://unpkg.com/tone@14.7.77/build/Tone.js"></script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
